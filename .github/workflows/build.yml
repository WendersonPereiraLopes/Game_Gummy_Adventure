name: Build Windows EXE Completo

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path requirements.txt) { pip install -r requirements.txt }
        pip install nuitka

    - name: Build EXE with Nuitka
      run: |
        python -m nuitka --standalone --onefile --windows-console-mode=disable --include-data-dir=asset=asset --assume-yes-for-downloads main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gummy_adventure_demo
        path: main.exe

